name: GitHub Actions Build and Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. git checkout...
      uses: actions/checkout@v1
    - name: 2. setup nodejs...
      uses: actions/setup-node@v1
      with:
        node-version: '16.x'
    - name: 3. install hexo...
      run:
        npm install
    - name: 4. hexo generate public files...
      run: |
        hexo clean
        hexo g
    - name: Deploy static to Tencent CloudBase
      id: deployStatic
      uses: TencentCloudBase/cloudbase-action@v1
      with:
        secretId: AKIDP978CsdmxnwatTMpFkhyo8P585DikM1D
        secretKey: 1FPdSPyniDCLlN9UgOFJjWtjHGz0Qq26
        envId: blog-9gf52p5n1f7c3a77
        staticSrcPath: ./public
